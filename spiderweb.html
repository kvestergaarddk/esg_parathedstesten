<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESG Parathedstesten — Spiderweb</title>
<style>
  @font-face {
    font-family: 'CZSans';
    src: url('/Brand_assets/Fonts/CreativeZooSans-Bold.woff2') format('woff2');
    font-weight: 700;
  }
  @font-face {
    font-family: 'CZSans';
    src: url('/Brand_assets/Fonts/CreativeZooSans-Regular.woff2') format('woff2');
    font-weight: 400;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue: #314ae2;
    --blue-light: #eef1fd;
    --blue-mid: #c5cef7;
    --text: #1a1a2e;
    --muted: #6b7280;
    --border: #dde2f8;
    --radius: 10px;
  }

  body {
    background: #f7f8ff;
    font-family: 'CZSans', system-ui, sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 24px;
  }

  .page {
    display: grid;
    grid-template-columns: 360px 1fr;
    gap: 32px;
    width: 100%;
    max-width: 1000px;
    align-items: start;
  }

  @media (max-width: 720px) {
    .page {
      grid-template-columns: 1fr;
    }
  }

  .panel {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
  }

  @media (min-width: 721px) {
    .panel {
      position: sticky;
      top: 40px;
    }
  }

  .panel-title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--blue);
    margin-bottom: 20px;
  }

  .resp-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .resp-table th {
    color: var(--muted);
    font-weight: 700;
    font-size: 10px;
    letter-spacing: .06em;
    text-transform: uppercase;
    padding: 0 4px 8px;
    text-align: center;
    border-bottom: 1.5px solid var(--border);
  }
  .resp-table th:first-child { text-align: left; padding-left: 0; }
  .resp-table td { padding: 5px 4px; vertical-align: middle; }
  .resp-table td:first-child { padding-left: 0; }

  .resp-label { font-size: 11px; color: var(--muted); white-space: nowrap; }

  .score-input {
    width: 46px;
    padding: 5px 6px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    font-family: 'CZSans', system-ui, sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    text-align: center;
    background: #fff;
    display: block;
    margin: 0 auto;
  }
  .score-input:focus { outline: none; border-color: var(--blue); background: var(--blue-light); }
  .score-avg { background: #f4f5fb; color: var(--muted); border-color: #eaecf5; cursor: default; }
  .score-avg:focus { border-color: #eaecf5; background: #f4f5fb; }
  .score-input::-webkit-inner-spin-button,
  .score-input::-webkit-outer-spin-button { -webkit-appearance: none; }

  .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

  .download-btn {
    width: 100%; padding: 11px 16px;
    background: var(--blue); color: #fff; border: none; border-radius: var(--radius);
    font-family: 'CZSans', system-ui, sans-serif;
    font-size: 13px; font-weight: 700; letter-spacing: .04em; cursor: pointer;
  }
  .download-btn:hover { opacity: .88; }
  .download-btn:active { transform: scale(.98); }

  .chart-wrap { aspect-ratio: 1; width: 100%; max-width: 560px; margin: 0 auto; }
  #spiderweb { width: 100%; height: 100%; overflow: visible; }

  .slice-btns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .slice-btn {
    font-size: 11px;
    padding: 9px 8px;
  }
</style>
</head>
<body>
<div class="page">

  <!-- VENSTRE: KONTROLLER -->
  <div class="panel">
    <div class="panel-title">Scoreinterval</div>
    <table class="resp-table">
      <thead>
        <tr>
          <th style="text-align:left">Dimension</th>
          <th style="color:#fe6c7a">Min</th>
          <th style="color:#2db36b">Max</th>
          <th style="color:#314ae2">Avg</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="resp-label">ESG Parat</td>
          <td><input type="number" class="score-input" id="min-top"    min="0" max="25" value="5"></td>
          <td><input type="number" class="score-input" id="max-top"    min="0" max="25" value="20"></td>
          <td><input type="number" class="score-input" id="avg-top"    min="0" max="25"></td>
        </tr>
        <tr>
          <td class="resp-label">Kommunikation</td>
          <td><input type="number" class="score-input" id="min-right"  min="0" max="25" value="5"></td>
          <td><input type="number" class="score-input" id="max-right"  min="0" max="25" value="20"></td>
          <td><input type="number" class="score-input" id="avg-right"  min="0" max="25"></td>
        </tr>
        <tr>
          <td class="resp-label">Organisation</td>
          <td><input type="number" class="score-input" id="min-bottom" min="0" max="25" value="5"></td>
          <td><input type="number" class="score-input" id="max-bottom" min="0" max="25" value="20"></td>
          <td><input type="number" class="score-input" id="avg-bottom" min="0" max="25"></td>
        </tr>
        <tr>
          <td class="resp-label">Proces</td>
          <td><input type="number" class="score-input" id="min-left"   min="0" max="25" value="5"></td>
          <td><input type="number" class="score-input" id="max-left"   min="0" max="25" value="20"></td>
          <td><input type="number" class="score-input" id="avg-left"   min="0" max="25"></td>
        </tr>
      </tbody>
    </table>

    <hr class="divider">

    <button class="download-btn" onclick="downloadPNG()" style="margin-bottom:10px">↓ Download fuld PNG</button>
    <div class="slice-btns">
      <button class="download-btn slice-btn" onclick="downloadSlicePNG('top')">↓ ESG Parat</button>
      <button class="download-btn slice-btn" onclick="downloadSlicePNG('right')">↓ Kommunikation</button>
      <button class="download-btn slice-btn" onclick="downloadSlicePNG('bottom')">↓ Organisation</button>
      <button class="download-btn slice-btn" onclick="downloadSlicePNG('left')">↓ Proces</button>
    </div>
  </div>

  <!-- HØJRE: DIAGRAM -->
  <div class="chart-wrap">

<script>
const CX = 187.63, CY = 187.63;
const NS = 'http://www.w3.org/2000/svg';

// Scorer kortlægges til de præcise ring-radier i SVG'en
// Score 25 = inderkant af den blå label-ring (~r=130)
const SCORE_MAP = [
  [0,   0],
  [5,   15.84],
  [10,  45.5],
  [15,  74.17],
  [20,  104.36],
  [25,  130],
];

function scoreToRadius(score) {
  const s = Math.max(0, Math.min(25, score));
  for (let i = 1; i < SCORE_MAP.length; i++) {
    const [s0, r0] = SCORE_MAP[i-1];
    const [s1, r1] = SCORE_MAP[i];
    if (s <= s1) {
      const t = (s - s0) / (s1 - s0);
      return r0 + t * (r1 - r0);
    }
  }
  return SCORE_MAP[SCORE_MAP.length - 1][1];
}

function getBandScores(recalcAvg = true) {
  function clamp(v) { const n = parseInt(v, 10); return isNaN(n) ? 0 : Math.max(0, Math.min(25, n)); }
  function clampF(v) { const n = parseFloat(v); return isNaN(n) ? 0 : Math.max(0, Math.min(25, n)); }
  function autoAvg(a, b) { return Math.round((a + b) / 2 * 10) / 10; }
  const dims = ['top', 'right', 'bottom', 'left'];
  const result = {};
  for (const d of dims) {
    const mn = clamp(document.getElementById('min-' + d).value);
    const mx = clamp(document.getElementById('max-' + d).value);
    let av;
    if (recalcAvg) {
      av = autoAvg(mn, mx);
      document.getElementById('avg-' + d).value = av;
    } else {
      av = clampF(document.getElementById('avg-' + d).value);
    }
    result[d] = { min: mn, avg: av, max: mx };
  }
  return result;
}

// Enkelt buelinje ved én given score — bruges til min/max-indikation
function makeArcLine(axisAngleDeg, score) {
  const r = scoreToRadius(score);
  if (r <= 0) return null;
  const a1 = (axisAngleDeg - 43 - 90) * Math.PI / 180;
  const a2 = (axisAngleDeg + 43 - 90) * Math.PI / 180;
  const fmt = n => n.toFixed(3);
  const x1 = CX + r * Math.cos(a1), y1 = CY + r * Math.sin(a1);
  const x2 = CX + r * Math.cos(a2), y2 = CY + r * Math.sin(a2);
  return `M ${fmt(x1)} ${fmt(y1)} A ${fmt(r)} ${fmt(r)} 0 0 1 ${fmt(x2)} ${fmt(y2)}`;
}

function makeArcPath(axisAngleDeg, minScore, maxScore) {
  const rMin = scoreToRadius(Math.min(minScore, maxScore));
  const rMax = scoreToRadius(Math.max(minScore, maxScore));
  const a1 = (axisAngleDeg - 43 - 90) * Math.PI / 180;
  const a2 = (axisAngleDeg + 43 - 90) * Math.PI / 180;
  const fmt = n => n.toFixed(3);
  const ox1 = CX + rMax * Math.cos(a1), oy1 = CY + rMax * Math.sin(a1);
  const ox2 = CX + rMax * Math.cos(a2), oy2 = CY + rMax * Math.sin(a2);
  const ix1 = CX + rMin * Math.cos(a1), iy1 = CY + rMin * Math.sin(a1);
  const ix2 = CX + rMin * Math.cos(a2), iy2 = CY + rMin * Math.sin(a2);
  if (rMin <= 0) {
    // Fuld pie-sektor fra centrum
    return `M ${fmt(CX)} ${fmt(CY)} L ${fmt(ox1)} ${fmt(oy1)} A ${fmt(rMax)} ${fmt(rMax)} 0 0 1 ${fmt(ox2)} ${fmt(oy2)} Z`;
  }
  // Annular sector: ydre bue CW (sweep=1), linje ind, indre bue CCW (sweep=0), luk
  return `M ${fmt(ox1)} ${fmt(oy1)} A ${fmt(rMax)} ${fmt(rMax)} 0 0 1 ${fmt(ox2)} ${fmt(oy2)} L ${fmt(ix2)} ${fmt(iy2)} A ${fmt(rMin)} ${fmt(rMin)} 0 0 0 ${fmt(ix1)} ${fmt(iy1)} Z`;
}

function renderBands(recalcAvg = true) {
  const bands = getBandScores(recalcAvg);
  const dims = [
    { key: 'top',    axisAngle: 0   },
    { key: 'right',  axisAngle: 90  },
    { key: 'bottom', axisAngle: 180 },
    { key: 'left',   axisAngle: 270 },
  ];
  dims.forEach(({ key, axisAngle }) => {
    const layer = document.getElementById('layer-' + key);
    layer.innerHTML = '';
    const { min, avg, max } = bands[key];
    for (const [score, cls] of [[min, 'radar-min'], [avg, 'radar-avg'], [max, 'radar-max']]) {
      const d = makeArcLine(axisAngle, score);
      if (!d) continue;
      const path = document.createElementNS(NS, 'path');
      path.setAttribute('d', d);
      path.setAttribute('class', cls);
      layer.appendChild(path);
    }
  });
}

function downloadPNG() {
  const svg = document.getElementById('spiderweb');
  const scale = 3;
  const svgData = new XMLSerializer().serializeToString(svg);
  const blob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const canvas = document.createElement('canvas');
  canvas.width  = Math.round(375.26 * scale);
  canvas.height = Math.round(375.26 * scale);
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  const img = new Image();
  img.onload = () => {
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    URL.revokeObjectURL(url);
    const a = document.createElement('a');
    a.download = 'esg-spiderweb.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  };
  img.src = url;
}

// Enkelt buelinje ved én given score — brugt i pizza-slice downloads
function makeArcLineAt(cx, cy, axisAngleDeg, score) {
  const r = scoreToRadius(score);
  if (r <= 0) return null;
  const a1 = (axisAngleDeg - 43 - 90) * Math.PI / 180;
  const a2 = (axisAngleDeg + 43 - 90) * Math.PI / 180;
  const fmt = n => n.toFixed(3);
  const x1 = cx + r * Math.cos(a1), y1 = cy + r * Math.sin(a1);
  const x2 = cx + r * Math.cos(a2), y2 = cy + r * Math.sin(a2);
  return `M ${fmt(x1)} ${fmt(y1)} A ${fmt(r)} ${fmt(r)} 0 0 1 ${fmt(x2)} ${fmt(y2)}`;
}

async function downloadSlicePNG(dim) {
  const { file, vw, vh, cx, cy, axisAngle, filename } = SLICE_CONFIG[dim];
  const { min, max } = getBandScores()[dim];

  // Hent pizza-SVG'en fra serveren (avg hentes nedenfor)
  const resp = await fetch(file);
  let svgText = await resp.text();

  const { avg } = getBandScores()[dim];

  // Injicer farve-CSS til min/avg/max linjer og gul stiplet range-linje
  const extraStyle = `<style>
    .pb-min{fill:none;stroke:#fe6c7a;stroke-width:2.5;stroke-linecap:round;}
    .pb-avg{fill:none;stroke:#314ae2;stroke-width:2.5;stroke-linecap:round;}
    .pb-max{fill:none;stroke:#2db36b;stroke-width:2.5;stroke-linecap:round;}
    .pb-range{fill:none;stroke:#f5c518;stroke-width:2;stroke-dasharray:5 3.5;stroke-linecap:round;}
  </style>`;
  svgText = svgText.replace('</defs>', extraStyle + '</defs>');

  // Gul stiplet radial linje fra min til max langs aksen
  let rangePath = '';
  const rMinV = scoreToRadius(min);
  const rMaxV = scoreToRadius(max);
  if (rMaxV > rMinV) {
    const aRad = (axisAngle - 90) * Math.PI / 180;
    const fmt = n => n.toFixed(3);
    const lx1 = cx + rMinV * Math.cos(aRad), ly1 = cy + rMinV * Math.sin(aRad);
    const lx2 = cx + rMaxV * Math.cos(aRad), ly2 = cy + rMaxV * Math.sin(aRad);
    rangePath = `<line class="pb-range" x1="${fmt(lx1)}" y1="${fmt(ly1)}" x2="${fmt(lx2)}" y2="${fmt(ly2)}"/>`;
  }

  // Tre separate buelinjer: min (rød), avg (blå), max (grøn) + gul range
  const linePaths = [[min,'pb-min'],[avg,'pb-avg'],[max,'pb-max']]
    .map(([s, cls]) => { const d = makeArcLineAt(cx, cy, axisAngle, s); return d ? `<path class="${cls}" d="${d}"/>` : ''; })
    .join('') + rangePath;

  svgText = svgText.replace('</svg>', linePaths + '</svg>');

  // Render til canvas (3× opløsning)
  const scale = 3;
  const W = Math.round(vw * scale);
  const H = Math.round(vh * scale);
  const blob = new Blob([svgText], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  const img = new Image();
  img.onload = () => {
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, W, H);
    ctx.drawImage(img, 0, 0, W, H);
    URL.revokeObjectURL(url);
    const a = document.createElement('a');
    a.download = filename;
    a.href = canvas.toDataURL('image/png');
    a.click();
  };
  img.src = url;
}

// Input-wiring: live-opdatering ved ændring
document.querySelectorAll('.score-input').forEach(inp => {
  inp.addEventListener('input', () => {
    let v = parseFloat(inp.value);
    if (!isNaN(v)) { if (v < 0) inp.value = 0; if (v > 25) inp.value = 25; }
    const isAvg = inp.id.startsWith('avg-');
    renderBands(!isAvg);
  });
});

renderBands();
</script>
